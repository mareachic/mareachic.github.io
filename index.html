<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuties Girls</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rosa: #C2185B;
      --rosa-claro: #F8BBD9;
      --rosa-suave: #FFF0F6;
      --texto: #1a1a1a;
      --gris: #6b7280;
      --borde: #f0e0ea;
      --verde: #25D366;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #FDFAF9;
      color: var(--texto);
      padding-bottom: 90px;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 270px;
      overflow: hidden;
    }
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(194,24,91,0.1) 0%, rgba(100,20,60,0.75) 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px 20px;
    }
    .tag {
      display: inline-block;
      background: var(--rosa);
      color: white;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 8px;
      width: fit-content;
    }
    .hero-overlay h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: white;
      line-height: 1.15;
      margin-bottom: 4px;
    }
    .hero-overlay p {
      color: rgba(255,255,255,0.88);
      font-size: 13px;
      font-weight: 500;
    }

    /* CARRITO FLOTANTE */
    .carrito-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--rosa);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(194,24,91,0.35);
      z-index: 50;
      transition: transform 0.15s;
    }
    .carrito-btn:active { transform: scale(0.95); }
    .carrito-btn svg { width: 18px; height: 18px; fill: white; }
    .carrito-count {
      background: #1a1a1a;
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }
    .carrito-btn.oculto { display: none; }

    /* CONTENIDO */
    .contenido { padding: 24px 16px 0; }

    .seccion-titulo {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--rosa);
      margin-bottom: 14px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .card {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 8px rgba(0,0,0,0.07);
    }

    .card-img-wrap { position: relative; }
    .card-img-wrap img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      object-position: top;
      display: block;
    }

    .btn-add {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--rosa);
      color: white;
      border: none;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: transform 0.15s, background 0.15s;
    }
    .btn-add:active { transform: scale(0.88); }
    .btn-add.agregado { background: var(--verde); }

    .card-body { padding: 10px 11px 12px; }
    .card-body h3 {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 3px;
    }
    .card-sub {
      font-size: 11px;
      color: var(--gris);
      margin-bottom: 5px;
    }
    .precio {
      font-size: 15px;
      font-weight: 700;
      color: var(--rosa);
    }

    /* INFO */
    .info-block {
      background: white;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 28px;
      border: 1px solid var(--borde);
    }
    .info-row {
      display: flex;
      gap: 14px;
      padding: 11px 0;
      border-bottom: 1px solid var(--borde);
      align-items: flex-start;
    }
    .info-row:last-child { border-bottom: none; padding-bottom: 0; }
    .info-row:first-child { padding-top: 0; }
    .info-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--rosa);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      min-width: 72px;
    }
    .info-valor { font-size: 13px; color: var(--gris); line-height: 1.5; }

    /* DRAWER */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: none;
    }
    .overlay.visible { display: block; }

    .drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-radius: 20px 20px 0 0;
      z-index: 101;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .drawer.visible { transform: translateY(0); }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--borde);
    }
    .drawer-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--rosa);
    }
    .btn-cerrar {
      background: none;
      border: none;
      font-size: 24px;
      color: var(--gris);
      cursor: pointer;
    }

    .drawer-items { padding: 14px 20px; }

    .item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--borde);
    }
    .item-row:last-child { border-bottom: none; }
    .item-nombre { flex: 1; font-size: 14px; font-weight: 500; }
    .item-controles { display: flex; align-items: center; gap: 10px; }
    .btn-cant {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--rosa-claro);
      background: none;
      color: var(--rosa);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    .item-cant { font-size: 15px; font-weight: 700; min-width: 20px; text-align: center; }
    .item-precio { font-size: 14px; font-weight: 700; color: var(--rosa); min-width: 60px; text-align: right; }

    .total-row {
      padding: 14px 20px;
      border-top: 2px solid var(--borde);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 16px;
    }
    .total-row span:last-child { color: var(--rosa); font-size: 18px; }

    .form-section { padding: 0 20px 20px; }
    .form-titulo {
      font-size: 13px;
      font-weight: 600;
      color: var(--gris);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .input-group { margin-bottom: 12px; }
    .input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--gris); margin-bottom: 5px; }
    .input-group input, .input-group select {
      width: 100%;
      border: 1.5px solid var(--borde);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--texto);
      outline: none;
      background: white;
    }
    .input-group input:focus, .input-group select:focus { border-color: var(--rosa-claro); }

    .btn-enviar {
      width: 100%;
      background: var(--verde);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }
    .btn-enviar svg { width: 20px; height: 20px; fill: white; }

    .carrito-vacio { text-align: center; padding: 40px 20px; color: var(--gris); font-size: 14px; }

    .wpp-btn-fijo {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--verde);
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 17px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      box-shadow: 0 -2px 20px rgba(37,211,102,0.2);
      z-index: 40;
    }
    .wpp-btn-fijo svg { width: 22px; height: 22px; fill: white; }
    .wpp-btn-fijo.oculto { display: none; }
  </style>
</head>
<body>

  <div class="hero">
    <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&h=400&fit=crop&q=80" alt="Cuties Girls">
    <div class="hero-overlay">
      <span class="tag">Santa Clara del Mar</span>
      <h1>Cuties<br>Girls</h1>
      <p>Moda femenina · Pedidos por WhatsApp</p>
    </div>
  </div>

  <button class="carrito-btn oculto" id="btnCarrito" onclick="abrirCarrito()">
    <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
    Mi selección
    <span class="carrito-count" id="carritoCount">0</span>
  </button>

  <div class="contenido">
    <p class="seccion-titulo">Nueva colección</p>
    <div class="grid" id="gridProductos"></div>

    <p class="seccion-titulo">Información</p>
    <div class="info-block">
      <div class="info-row">
        <span class="info-label">Envíos</span>
        <span class="info-valor">Santa Clara del Mar · Coordinamos por WhatsApp</span>
      </div>
      <div class="info-row">
        <span class="info-label">Talles</span>
        <span class="info-valor">S · M · L · XL — consultar stock</span>
      </div>
      <div class="info-row">
        <span class="info-label">Pago</span>
        <span class="info-valor">Transferencia · MercadoPago · Efectivo</span>
      </div>
    </div>
  </div>

  <a class="wpp-btn-fijo" id="wppFijo" href="https://wa.me/5492231234567" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Consultar por WhatsApp
  </a>

  <div class="overlay" id="overlay" onclick="cerrarCarrito()"></div>

  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <h2>Mi selección</h2>
      <button class="btn-cerrar" onclick="cerrarCarrito()">✕</button>
    </div>
    <div id="drawerContenido"></div>
  </div>

  <script>
    const WPP_NUMBER = '5492231234567';

    const productos = [
      { id: 1, nombre: 'Vestido floral verano', precio: 18000, talle: true, img: 'https://images.unsplash.com/photo-1585487000160-6ebcfceb0d03?w=400&h=280&fit=crop&q=80&crop=top' },
      { id: 2, nombre: 'Remera básica colores', precio: 8500, talle: true, img: 'https://images.unsplash.com/photo-1622290291468-a28f7a7dc6a8?w=400&h=280&fit=crop&q=80&crop=top' },
      { id: 3, nombre: 'Buzo oversize', precio: 15000, talle: true, img: 'https://images.unsplash.com/photo-1556821840-3a63f15732ce?w=400&h=280&fit=crop&q=80&crop=top' },
      { id: 4, nombre: 'Short de jean', precio: 12000, talle: true, img: 'https://images.unsplash.com/photo-1591195853828-11db59a44f43?w=400&h=280&fit=crop&q=80&crop=top' },
      { id: 5, nombre: 'Camisa lino beige', precio: 14000, talle: true, img: 'https://images.unsplash.com/photo-1564257631407-4deb1f99d992?w=400&h=280&fit=crop&q=80&crop=top' },
      { id: 6, nombre: 'Top crop deportivo', precio: 9500, talle: true, img: 'https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=400&h=280&fit=crop&q=80&crop=top' },
      { id: 7, nombre: 'Pantalón wide leg', precio: 16500, talle: true, img: 'https://images.unsplash.com/photo-1594938298603-c8148c4dae35?w=400&h=280&fit=crop&q=80&crop=top' },
      { id: 8, nombre: 'Vestido negro noche', precio: 22000, talle: true, img: 'https://images.unsplash.com/photo-1566174053879-31528523f8ae?w=400&h=280&fit=crop&q=80&crop=top' },
    ];

    let carrito = {};
    let tallesSeleccionados = {};

    function renderGrid() {
      const grid = document.getElementById('gridProductos');
      grid.innerHTML = productos.map(p => `
        <div class="card">
          <div class="card-img-wrap">
            <img src="${p.img}" alt="${p.nombre}" loading="lazy">
            <button class="btn-add" id="btn-${p.id}" onclick="agregar(${p.id})">+</button>
          </div>
          <div class="card-body">
            <h3>${p.nombre}</h3>
            <div class="card-sub">Talles S · M · L · XL</div>
            <div class="precio">$${p.precio.toLocaleString('es-AR')}</div>
          </div>
        </div>
      `).join('');
    }

    function agregar(id) {
      carrito[id] = (carrito[id] || 0) + 1;
      const btn = document.getElementById(`btn-${id}`);
      btn.classList.add('agregado');
      btn.textContent = '✓';
      setTimeout(() => { btn.classList.remove('agregado'); btn.textContent = '+'; }, 800);
      actualizarUI();
    }

    function cambiarCantidad(id, delta) {
      carrito[id] = (carrito[id] || 0) + delta;
      if (carrito[id] <= 0) { delete carrito[id]; delete tallesSeleccionados[id]; }
      actualizarUI();
      renderDrawer();
    }

    function actualizarUI() {
      const total = Object.values(carrito).reduce((a, b) => a + b, 0);
      document.getElementById('carritoCount').textContent = total;
      const btnCarrito = document.getElementById('btnCarrito');
      const wppFijo = document.getElementById('wppFijo');
      if (total > 0) { btnCarrito.classList.remove('oculto'); wppFijo.classList.add('oculto'); }
      else { btnCarrito.classList.add('oculto'); wppFijo.classList.remove('oculto'); }
    }

    function setTalle(id, talle) {
      tallesSeleccionados[id] = talle;
    }

    function renderDrawer() {
      const contenido = document.getElementById('drawerContenido');
      const ids = Object.keys(carrito).map(Number);

      if (ids.length === 0) {
        contenido.innerHTML = '<div class="carrito-vacio">Tu selección está vacía</div>';
        return;
      }

      const items = ids.map(id => {
        const p = productos.find(x => x.id === id);
        const cant = carrito[id];
        const talleActual = tallesSeleccionados[id] || '';
        return `
          <div class="item-row">
            <div style="flex:1">
              <div class="item-nombre">${p.nombre}</div>
              <select onchange="setTalle(${id}, this.value)" style="margin-top:5px; font-size:12px; padding:4px 8px; border-radius:6px; border:1px solid #f0e0ea; color:#6b7280;">
                <option value="">Talle</option>
                <option ${talleActual==='S'?'selected':''}>S</option>
                <option ${talleActual==='M'?'selected':''}>M</option>
                <option ${talleActual==='L'?'selected':''}>L</option>
                <option ${talleActual==='XL'?'selected':''}>XL</option>
              </select>
            </div>
            <div class="item-controles">
              <button class="btn-cant" onclick="cambiarCantidad(${id}, -1)">−</button>
              <span class="item-cant">${cant}</span>
              <button class="btn-cant" onclick="cambiarCantidad(${id}, 1)">+</button>
            </div>
            <span class="item-precio">$${(p.precio * cant).toLocaleString('es-AR')}</span>
          </div>
        `;
      }).join('');

      const totalPrecio = ids.reduce((sum, id) => {
        const p = productos.find(x => x.id === id);
        return sum + p.precio * carrito[id];
      }, 0);

      contenido.innerHTML = `
        <div class="drawer-items">${items}</div>
        <div class="total-row"><span>Total</span><span>$${totalPrecio.toLocaleString('es-AR')}</span></div>
        <div class="form-section">
          <p class="form-titulo">Datos para la entrega</p>
          <div class="input-group">
            <label>Tu nombre</label>
            <input type="text" id="inputNombre" placeholder="Ej: Valentina Pérez">
          </div>
          <div class="input-group">
            <label>Dirección</label>
            <input type="text" id="inputDireccion" placeholder="Ej: Los Pinos 234, Santa Clara">
          </div>
          <button class="btn-enviar" onclick="enviarPedido()">
            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Enviar pedido por WhatsApp
          </button>
        </div>
      `;
    }

    function enviarPedido() {
      const nombre = document.getElementById('inputNombre').value.trim();
      const direccion = document.getElementById('inputDireccion').value.trim();
      if (!nombre || !direccion) { alert('Por favor completá tu nombre y dirección'); return; }

      const ids = Object.keys(carrito).map(Number);
      const lineas = ids.map(id => {
        const p = productos.find(x => x.id === id);
        const talle = tallesSeleccionados[id] ? ` (Talle ${tallesSeleccionados[id]})` : '';
        return `• ${carrito[id]}x ${p.nombre}${talle} — $${(p.precio * carrito[id]).toLocaleString('es-AR')}`;
      });

      const total = ids.reduce((sum, id) => {
        const p = productos.find(x => x.id === id);
        return sum + p.precio * carrito[id];
      }, 0);

      const mensaje = `Hola! Quiero hacer un pedido 👗\n\n${lineas.join('\n')}\n\n*Total: $${total.toLocaleString('es-AR')}*\n\n📍 Dirección: ${direccion}\n👤 Nombre: ${nombre}`;
      window.open(`https://wa.me/${WPP_NUMBER}?text=${encodeURIComponent(mensaje)}`, '_blank');
    }

    function abrirCarrito() { renderDrawer(); document.getElementById('overlay').classList.add('visible'); document.getElementById('drawer').classList.add('visible'); }
    function cerrarCarrito() { document.getElementById('overlay').classList.remove('visible'); document.getElementById('drawer').classList.remove('visible'); }

    renderGrid();
  </script>
</body>
</html>
